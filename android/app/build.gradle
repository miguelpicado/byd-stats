apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

// Load signing credentials from local.properties (gitignored, never committed)
// Strips the UTF-8 BOM that Windows PowerShell adds when writing files
def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) {
    def content = localPropsFile.getText('UTF-8')
    if (content.startsWith('\uFEFF')) content = content.substring(1) // strip BOM
    localProps.load(new StringReader(content))
}

android {
    namespace = "com.bydstats.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.bydstats.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 9
        versionName "2.1.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Google OAuth Client ID - injected at build time, never hardcoded in source
        def googleClientId = System.getenv('GOOGLE_CLIENT_ID') ?: localProps.getProperty('GOOGLE_CLIENT_ID') ?: ''
        resValue "string", "server_client_id", googleClientId
        buildConfigField "String", "SERVER_CLIENT_ID", "\"${googleClientId}\""
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            def keystoreFile = System.getenv('KEYSTORE_FILE') ?: localProps.getProperty('KEYSTORE_FILE') ?: "release.jks"
            storeFile file(keystoreFile)
            storePassword System.getenv('KEYSTORE_PASSWORD') ?: localProps.getProperty('KEYSTORE_PASSWORD') ?: ""
            keyAlias System.getenv('KEY_ALIAS') ?: localProps.getProperty('KEY_ALIAS') ?: "androidreleasekey"
            keyPassword System.getenv('KEY_PASSWORD') ?: localProps.getProperty('KEY_PASSWORD') ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def hasReleaseKey = System.getenv('KEYSTORE_FILE') || System.getenv('KEYSTORE_PASSWORD') || file("release.jks").exists()
            signingConfig hasReleaseKey ? signingConfigs.release : signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"
    implementation platform('com.google.firebase:firebase-bom:33.9.0')
    implementation 'com.google.firebase:firebase-functions'
    implementation 'com.google.firebase:firebase-auth'
// wearApp project(":wear")
    implementation "com.google.android.gms:play-services-wearable:19.0.0"
    implementation project(':capawesome-capacitor-file-picker')
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
